<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks</title>
    <style>
        :root {
            --bg: #f7f8ff;
            --card: #ffffff;
            --accent: #5c6ac4;
            --accent-dark: #4a54a1;
            --text: #111827;
            --muted: #6b7280;
            --border: #d1d5db;
            --success: #10b981;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #eef2ff 0%, #f8fafc 45%, #f7f8ff 100%);
            color: var(--text);
        }
        .page {
            min-height: 100vh;
            padding: 28px 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .content {
            width: 100%;
            max-width: 900px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }
        .header h1 {
            margin: 0;
            font-size: clamp(2rem, 2.5vw, 2.6rem);
        }
        .subtitle {
            color: var(--muted);
            margin-top: 8px;
            font-size: 1rem;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 22px;
            min-height: 48px;
            border-radius: 16px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            text-decoration: none;
            transition: background-color 0.18s ease, transform 0.18s ease;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
        }
        .list {
            display: grid;
            gap: 18px;
        }
        .card {
            background: var(--card);
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.06);
        }
        .card h2 {
            margin: 0 0 10px;
            font-size: 1.25rem;
        }
        .card p {
            margin: 0 0 14px;
            color: var(--muted);
            line-height: 1.7;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            background: #eff6ff;
            color: var(--accent-dark);
            font-size: 0.88rem;
            font-weight: 700;
        }
        .empty-state {
            text-align: center;
            color: var(--muted);
            padding: 48px 22px;
            border: 2px dashed rgba(148, 163, 184, 0.4);
            border-radius: 22px;
            background: #fff;
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="content">
            <header class="header">
                <div>
                    <h1>My Tasks that created</h1>
                    <p class="subtitle">Revisa tus tareas, identifica las más importantes y crea nuevas tareas fácilmente.</p>
                </div>
            </header>

                <section class="list">
                    {% for task in tasks %}
                        <article class="card">
                            <a href="#" class="task-link">{{ task.title }}</a>
                        </article>
                    {% endfor %}
                </section><br>
                <a href="{% url 'create'%}">
                <button class="btn-primary" type="button">Create Task</button>
                </a>
        </div>
    </main>
</body>
</html>
